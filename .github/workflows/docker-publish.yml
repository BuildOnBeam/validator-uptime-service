name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - "aggregator/**"
      - "config/**"
      - "contract/**"
      - "db/**"
      - "delegation/**"
      - "logging/**"
      - "service/**"
      - "validator/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"

env:
  IMAGE_NAME: devteammerit/validator-uptime-service

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  # Each platform builds on a native runner — no QEMU, no emulation overhead.
  # Builds push by digest so the merge job can assemble the multi-arch manifest.
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform_pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # Push by digest (no tag yet) so the merge job can create one manifest.
          outputs: >-
            type=image,
            name=${{ env.IMAGE_NAME }},
            push-by-digest=true,
            name-canonical=true,
            push=${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache is scoped per platform to avoid cross-arch cache pollution.
          cache-from: type=gha,scope=${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_pair }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge ───────────────────────────────────────────────────────────────────
  # Assembles both platform digests into a single multi-arch manifest,
  # applies all tags, then updates the Kustomize base in beam-k8s-infra-apps.
  merge:
    name: Merge manifests & update k8s
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
          labels: |
            org.opencontainers.image.title=validator-uptime-service
            org.opencontainers.image.description=Validator uptime proof generator and submitter for Beam L1 / Avalanche

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      # ── Update k8s image tag ─────────────────────────────────────────────────
      - name: Update image tag in beam-k8s-infra-apps
        env:
          K8S_REPO_PAT: ${{ secrets.K8S_REPO_PAT }}
        run: |
          SHA_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"

          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin

          git clone \
            "https://x-access-token:${K8S_REPO_PAT}@github.com/BuildOnBeam/beam-k8s-infra-apps.git" \
            k8s-infra-apps
          cd k8s-infra-apps

          cd apps/uptime-service/base
          kustomize edit set image \
            devteammerit/validator-uptime-service=devteammerit/validator-uptime-service:${SHA_TAG}
          cd ../../..

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add apps/uptime-service/base/kustomization.yaml
          git diff --staged --quiet \
            || git commit -m "ci(uptime-service): update image to ${SHA_TAG}"
          git push
